[pytest]
# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Exclude one-off test directory
addopts = --ignore=tests/one-offs

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')

# Warnings to ignore or treat as errors
filterwarnings =
    # Ignore CacheTestHelper collection warning from DazzleTreeLib
    ignore:cannot collect test class 'CacheTestHelper':pytest.PytestCollectionWarning