name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    strategy:
      matrix:
        # Floor is 3.9: dazzle-filekit pulls dazzle-lib, which requires >=3.9.
        python-version: ['3.9', '3.10', '3.11', '3.12']
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install -e .[dev]
    
    - name: Run tests with pytest
      run: |
        pytest tests/ -v --tb=short
    
    - name: Test CLI commands
      run: |
        folder-datetime-fix --version
        folder-datetime-fix --help
        python -m folder_datetime_fix --version
    
    - name: Test basic functionality
      run: |
        folder-datetime-fix . --depth 0 --dry-run --quiet
        python -m folder_datetime_fix tests --depth 0 --dry-run -v