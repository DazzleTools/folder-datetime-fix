name: Publish to PyPI

# Trusted publishing (OIDC) -- no API token stored. The PyPI project's trusted
# publisher is configured for:
#   repository:  DazzleTools/folder-datetime-fix
#   workflow:    release.yml   (this file -- the name is matched by PyPI)
#   environment: pypi
# Publishes on a published GitHub Release (tag a clean version off main first).
on:
  release:
    types: [published]

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build distributions
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Check metadata
        run: |
          python -m pip install twine
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI (trusted publishing)
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
